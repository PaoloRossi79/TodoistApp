name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: windows-latest
    strategy:
      matrix:
        dotnet-version: [ '10.0.x' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet-version }}

      - name: Restore
        run: dotnet restore TodoistaVoce.slnx

      - name: Build
        run: dotnet build TodoistaVoce.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test TodoistaVoceTests/TodoistaVoceTests.csproj --no-build --verbosity normal

      - name: Upload test results (JUnit)
        if: always()
        uses: mikeal/publish-test-results-action@v1
        with:
          path: '**/TestResults/*.trx'
